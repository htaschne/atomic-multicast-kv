services:
  partition0:
    build: .
    environment:
      PARTITION_ID: "0"
      PROTOCOL_MODE: "${PROTOCOL_MODE:-strengthened}"
      PEERS: "0=http://partition0:4000,1=http://partition1:4001"
    ports:
      - "4000:4000"

  partition1:
    build: .
    environment:
      PARTITION_ID: "1"
      PROTOCOL_MODE: "${PROTOCOL_MODE:-strengthened}"
      PEERS: "0=http://partition0:4000,1=http://partition1:4001"
    ports:
      - "4001:4001"
